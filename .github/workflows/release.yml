name: release

# Triggered by pushing a tag like v1.2.3. The runner reads
# github.ref_name (always includes the "v" prefix) and turns it into:
#   - --build-name=1.2.3  (semver, no "v" — what package_info_plus reports)
#   - octodo-v1.2.3-windows-x64.zip      (asset on GitHub + R2 mirror)
#   - octodo-v1.2.3-windows-x64.zip.sha256 (sidecar)
#   - manifest.json                      (R2 mirror only)
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # softprops/action-gh-release creates the release

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Non-secret: the public URL the in-app R2UpdateFeed will GET.
      # Already includes the `cf1/octodo/` path prefix; the
      # manifest.json's `browser_download_url` is built as
      # `${R2_PUBLIC_BASE}/<asset>`, so the in-app GETs match the
      # object keys we put. Example value:
      #   https://pub-dd7476e103ca42c3afadd4ec6903d370.r2.dev/cf1/octodo
      R2_PUBLIC_BASE: ${{ vars.R2_PUBLIC_BASE }}
      # Cloudflare dashboard → R2 → Object Storage → bucket name.
      # For this project: `cf1`.
      R2_BUCKET: ${{ vars.R2_BUCKET }}

    steps:
      - uses: actions/checkout@v4

      # Pin to a version that matches your dev environment for
      # reproducible builds. cache: true preserves ~/.pub-cache across
      # runs of the same Flutter version.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      # Install the Rust toolchain (stable). Required because
      # `flutter_alacritty` pulls in `rust_lib_flutter_alacritty` as a
      # transitive dep — that plugin declares `ffiPlugin: true`, which
      # makes Flutter invoke `cargo build --target
      # x86_64-pc-windows-msvc` during `flutter build windows` to
      # compile the Alacritty Rust crate to a cdylib. Without rustc +
      # cargo on PATH the build fails at the plugin-build step.
      #
      # dtolnay/rust-toolchain@stable installs the toolchain and adds
      # it to PATH; the implicit cache step restores ~/.cargo from a
      # previous run, which matters because `rust_lib_flutter_alacritty`
      # pulls in vte / alacritty_terminal / similar crates that take
      # ~3 min to compile cold.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify toolchain
        shell: pwsh
        run: |
          Write-Host "--- Flutter ---"
          flutter --version
          Write-Host "--- Rust ---"
          rustc --version
          cargo --version

      - name: Build, zip, sidecar SHA-256
        id: build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # github.ref_name is e.g. "v1.2.3". Strip the leading "v" for
          # --build-name (Dart compares as semver; "v1.2.3" fails parse)
          # but keep it in the asset filename so the asset filename and
          # the git tag stay in lockstep.
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v',''

          # Refuse malformed tags up front — better than paying 6–8 min
          # for a build whose assets the in-app updater's compareSemver
          # would fail to parse. Accepts "1.2.3" or "1.2.3-rc.1".
          if ($ver -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.]+)?$') {
            throw "Tag '$tag' is not semver-shaped (expected vX.Y.Z or vX.Y.Z-prerelease)"
          }

          Write-Host "Building octodo $ver (build $env:GITHUB_RUN_NUMBER)"

          flutter pub get
          flutter build windows --release `
            --build-name=$ver `
            --build-number=$env:GITHUB_RUN_NUMBER

          $src = 'build\windows\x64\runner\Release'
          $zip = "octodo-v$ver-windows-x64.zip"
          $sha = "$zip.sha256"

          if (-not (Test-Path $src)) {
            throw "Build output not found at $src"
          }

          # Enumerate the Release/ contents with a wildcard so we zip
          # at the archive root (no "Release/" parent directory) AND
          # include subdirectories like data/ that the Flutter Windows
          # embedder requires next to the exe. -LiteralPath defeats
          # wildcard interpretation of the path itself, while $src\*
          # is the actual pattern Compress-Archive expands.
          Compress-Archive `
            -Path "$src\*" `
            -DestinationPath $zip `
            -CompressionLevel Optimal `
            -Force

          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          [System.IO.File]::WriteAllText($sha, $hash)

          # Expose the stripped version so the next steps can name the
          # upload correctly (action expressions don't regex-strip "v").
          "ver=$ver" | Out-File -Append -Encoding ascii -FilePath $env:GITHUB_OUTPUT

          Write-Host "Wrote $zip ($hash)"

      # ---------------------------------------------------------------
      # Synthesize manifest.json — a static JSON describing the current
      # release, mirrored byte-for-byte from the shape GitHub's
      # /releases/latest returns so the in-app R2UpdateFeed can reuse
      # resolveReleaseJson() with zero changes.
      #
      # browser_download_url on each asset is rewritten to point at the
      # R2 PUBLIC base (R2_PUBLIC_BASE) so the in-app download path
      # pulls the bytes from R2, not from GitHub.
      #
      # One manifest per release, overwritten in place at
      #   cf1/octodo/manifest.json
      # so the in-app R2UpdateFeed always sees a single, "what's
      # latest" pointer.
      # ---------------------------------------------------------------
      - name: Synthesize R2 manifest.json
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver  = "${{ steps.build.outputs.ver }}"
          $tag  = "${{ github.ref_name }}"
          $base = "$env:R2_PUBLIC_BASE"
          $zip  = "octodo-v$ver-windows-x64.zip"
          $sha  = "$zip.sha256"
          $now  = (Get-Date).ToUniversalTime().ToString('o')

          $zipSize = (Get-Item $zip).Length
          $shaSize = (Get-Item $sha).Length

          # Construct in `[ordered]@{}` order so the JSON keys appear
          # in the same order GitHub emits — handy for diffing the
          # byte-level structure against a real GitHub response when
          # debugging the R2UpdateFeed. `convertto-json -Depth 10`
          # handles the nested assets array; `ConvertTo-Json` would
          # emit `Microsoft.PowerShell.Commands.WebResponseObject`
          # placeholders for anything unquoted by default.
          $manifest = [ordered]@{
            tag_name      = $tag
            name          = $tag
            prerelease    = $tag.Contains('-')
            published_at  = $now
            html_url      = "https://github.com/invented-pro/octodo/releases/tag/$tag"
            body          = ""
            assets        = @(
              [ordered]@{
                name                 = $zip
                size                 = $zipSize
                browser_download_url = "$base/$zip"
                content_type         = "application/zip"
              }
              [ordered]@{
                name                 = $sha
                size                 = $shaSize
                browser_download_url = "$base/$sha"
                content_type         = "text/plain; charset=utf-8"
              }
            )
          } | ConvertTo-Json -Depth 10

          $manifest | Out-File -Encoding utf8 -FilePath manifest.json
          Write-Host "Wrote manifest.json:"
          Get-Content manifest.json

      # Push the zip, the .sha256 sidecar, and manifest.json to R2.
      # We do this in a plain `shell: pwsh` step rather than via
      # cloudflare/wrangler-action because that action tokenizes the
      # `command:` input on whitespace and drops everything after the
      # first arg (we hit "Either the --file or --pipe options are
      # required" on the first test). Native PowerShell + wrangler
      # CLI in a foreach loop survives the multi-flag invocation.
      #
      # Wrangler reads CF_API_TOKEN / CF_ACCOUNT_ID straight from
      # the step's `env:` block — no UI/no action wrapper needed.
      # Both names are masked in the action log automatically.
      - name: Install wrangler
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # wrangler 4.x is current; pin to ^4 to stay off the v3 line
          # which the test run shipped automatically (and that emitted
          # the "out of date" warning + 3.x semantics).
          npm install --silent --no-audit --no-fund -g wrangler@^4
          wrangler --version

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bucket = "$env:R2_BUCKET"
          $ver    = "${{ steps.build.outputs.ver }}"
          $zip    = "octodo-v$ver-windows-x64.zip"
          $sha    = "$zip.sha256"

          $uploads = @(
            @{
              key  = "octodo/$zip"
              file = $zip
              type = "application/zip"
            }
            @{
              key  = "octodo/$sha"
              file = $sha
              type = "text/plain; charset=utf-8"
            }
            @{
              key  = "octodo/manifest.json"
              file = "manifest.json"
              type = "application/json; charset=utf-8"
            }
          )

          foreach ($u in $uploads) {
            $target = "$bucket/$($u.key)"
            Write-Host ">> r2 object put $target  ($($u.type))"
            wrangler r2 object put $target `
              --file $u.file `
              --content-type $u.type
            if ($LASTEXITCODE -ne 0) {
              throw "wrangler upload failed for $target (exit=$LASTEXITCODE)"
            }
          }
          Write-Host "R2 mirror complete: $bucket/octodo/{$zip,$sha,manifest.json}"

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          # Mark as pre-release whenever the tag carries a "-prerelease"
          # suffix. GitHub's /releases/latest endpoint already filters out
          # pre-releases, so this is enough to keep stable users from
          # being prompted to "update" to a v1.2.0-rc.1 build.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            octodo-v${{ steps.build.outputs.ver }}-windows-x64.zip
            octodo-v${{ steps.build.outputs.ver }}-windows-x64.zip.sha256
